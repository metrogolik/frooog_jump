<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump Mobile</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
}

canvas {
    display: block;
}

#score {
    position: fixed;
    top: 15px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#gyroBtn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: orange;
    color: white;
    z-index: 20;
}
</style>
</head>
<body>

<div id="score">0</div>
<button id="gyroBtn">Включить гироскоп</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const gyroBtn = document.getElementById("gyroBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.5;
let jumpForce = -15;
let score = 0;

let player = {
    x: canvas.width / 2,
    y: canvas.height - 120,
    width: 50,
    height: 50,
    velX: 0,
    velY: 0,
    facing: 1
};

let platforms = [];
const platformWidth = 80;
const platformHeight = 15;
const platformGap = 120;

// --- ЗАГРУЗКА КАРТИНОК ---
let playerStand = new Image();
let playerFly = new Image();

playerStand.src = "player_stand.png";
playerFly.src = "player_fly.png";

let imagesLoaded = 0;

function startIfReady() {
    imagesLoaded++;
    if (imagesLoaded === 2) {
        init();
        gameLoop();
    }
}

playerStand.onload = startIfReady;
playerFly.onload = startIfReady;

// Если ошибка загрузки — всё равно запускаем игру
playerStand.onerror = startIfReady;
playerFly.onerror = startIfReady;

// --- ПЛАТФОРМЫ ---
function createPlatforms() {
    platforms = [];
    let y = canvas.height;

    while (y > 0) {
        let x = Math.random() * (canvas.width - platformWidth);
        platforms.push({
            x: x,
            y: y,
            width: platformWidth,
            height: platformHeight
        });
        y -= platformGap;
    }
}

// --- ИНИЦИАЛИЗАЦИЯ ---
function init() {
    createPlatforms();
}

// --- ИГРОВОЙ ЦИКЛ ---
function gameLoop() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Гравитация
    player.velY += gravity;
    player.y += player.velY;
    player.x += player.velX;

    // Зацикливание по горизонтали
    if (player.x > canvas.width) player.x = 0;
    if (player.x + player.width < 0) player.x = canvas.width;

    // Определяем направление
    if (player.velX > 0) player.facing = 1;
    if (player.velX < 0) player.facing = -1;

    // Столкновение с платформами
    platforms.forEach(p => {

        if (
            player.velY > 0 &&
            player.x + player.width > p.x &&
            player.x < p.x + p.width &&
            player.y + player.height > p.y &&
            player.y + player.height < p.y + p.height
        ) {
            player.velY = jumpForce;
            score++;
            scoreDisplay.innerText = score;
        }

        ctx.fillStyle = "green";
        ctx.fillRect(p.x, p.y, p.width, p.height);
    });

    // Камера вверх
    if (player.y < canvas.height / 2) {

        let diff = canvas.height / 2 - player.y;
        player.y = canvas.height / 2;

        platforms.forEach(p => {
            p.y += diff;

            if (p.y > canvas.height) {
                p.y = 0;
                p.x = Math.random() * (canvas.width - platformWidth);
            }
        });
    }

    // Рисуем игрока
    ctx.save();
    ctx.translate(player.x + player.width/2, player.y + player.height/2);
    ctx.scale(player.facing, 1);

    let sprite = player.velY > 0 ? playerFly : playerStand;

    ctx.drawImage(
        sprite,
        -player.width/2,
        -player.height/2,
        player.width,
        player.height
    );

    ctx.restore();

    // Game Over
    if (player.y > canvas.height) {
        alert("Game Over! Score: " + score);
        location.reload();
    }

    requestAnimationFrame(gameLoop);
}

// --- ГИРОСКОП ---
gyroBtn.addEventListener("click", () => {

    if (typeof DeviceOrientationEvent.requestPermission === "function") {

        DeviceOrientationEvent.requestPermission()
            .then(response => {
                if (response === "granted") {
                    window.addEventListener("deviceorientation", handleTilt);
                    gyroBtn.style.display = "none";
                }
            });

    } else {
        window.addEventListener("deviceorientation", handleTilt);
        gyroBtn.style.display = "none";
    }

});

function handleTilt(e) {
    player.velX = e.gamma * 0.3;
}
</script>

</body>
</html>
